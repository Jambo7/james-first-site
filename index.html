<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Inventory Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fef9e7 0%, #fef5e7 40%, #fdf6ec 100%);
      color: #2c2c2c;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      max-width: 420px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #bd1d1d;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      color: #5a5a5a;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #1d1d74;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(232, 168, 56, 0.25);
    }

    .btn:hover {
      background: #d99a2e;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(232, 168, 56, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Kitchen Inventory Manager</h1>
    <p class="subtitle">Keep track of what’s in your pantry and fridge—less waste, simpler cooking.</p>
    <a href="#" class="btn">Try Now</a>
  </main>
</body>
</html>
